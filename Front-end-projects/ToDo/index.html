<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="app">
        <header>
            <h1>
                <i class="fa-regular fa-circle-check"></i>
                My Tasks
            </h1>
            <p id="date">16 Feb</p>
        </header>
        <div class="todo-input">
            <input type="text" placeholder="What's on your mind?" id="task-input">
            <button id="add-task">
                <i class="fas fa-plus"></i>
            </button>
        </div>
        <div class="filters">
            <span class="filter active" data-filter="all">
                All
            </span>
            <span class="filter" data-filter="active">
                Active
            </span>
            <span class="filter" data-filter="completed">
                Completed
            </span>
        </div>
        <div class="todos-container">
            <ul id="todos-list">
                <!-- TO BE ADDED USING JAVASCRIPT -->
            </ul>
        </div>
        <div class="empty-state hidden">
            <i class="fa-solid fa-wind"></i>
            <p>No Tasks yet</p>
        </div>
        <footer>
            <p id="items-left">0 items left</p>
            <button>clear Completed</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
