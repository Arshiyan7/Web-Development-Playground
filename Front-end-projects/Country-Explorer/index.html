<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="intro">
            <h1>Country Explorer</h1>
            <p>Search any country to see details</p>
        </div>
        <div class="search">
            <input type="text" class="input_design" id="country_input" placeholder="e.g. Pakistan, Japan, Germany...">
            <button class="btn_design" id="search-btn">Search</button>
        </div>
        <div class="result">
            <div class="country-header">
                <div class="flag_design" id="flag">🏳️</div>
                <div class="country-info">
                    <h2 id="country-name">—</h2>
                    <div class="region-subregion">
                        <p id="region"></p>
                        <p id="sub-region">—</p>
                    </div>
                </div>
            </div>
            <div class="country-details">
                <div class="info-item">
                    <p class="label">Capital</p>
                    <p class="value" id="capital">—</p>
                </div>

                <div class="info-item">
                    <p class="label">Population</p>
                    <p class="value" id="population">—</p>
                </div>

                <div class="info-item">
                    <p class="label">Area</p>
                    <p class="value" id="area-detail">—</p>
                </div>

                <div class="info-item">
                    <p class="label">Calling Code</p>
                    <p class="value" id="call-detail">—</p>
                </div>

                <div class="info-item">
                    <p class="label">Currency</p>
                    <p class="value" id="currency">—</p>
                </div>

                <div class="info-item">
                    <p class="label">Languages</p>
                    <p class="value" id="languages">—</p>
                </div>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
